version: "3.9"

services:
  hesk-db:
    image: mariadb:11
    container_name: prueba-tecnica-hesk-db
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MARIADB_DATABASE: ${HESK_DB_NAME}
      MARIADB_USER: ${HESK_DB_USER}
      MARIADB_PASSWORD: ${HESK_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${HESK_DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - hesk_db_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${HESK_DB_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  hesk-web:
    build: ./hesk
    container_name: prueba-tecnica-hesk-web
    restart: unless-stopped
    depends_on:
      - hesk-db
    ports:
      - "${HESK_PORT}:80"
    volumes:
      - ./hesk:/var/www/html
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  zabbix-db:
    image: mysql:8.0
    container_name: prueba-tecnica-zabbix-db
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_DATABASE: ${ZABBIX_DB_NAME}
      MYSQL_USER: ${ZABBIX_DB_USER}
      MYSQL_PASSWORD: ${ZABBIX_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${ZABBIX_DB_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - zabbix_db_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${ZABBIX_DB_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
    container_name: prueba-tecnica-zabbix-server
    restart: unless-stopped
    depends_on:
      - zabbix-db
    environment:
      TZ: ${TZ}
      DB_SERVER_HOST: zabbix-db
      MYSQL_DATABASE: ${ZABBIX_DB_NAME}
      MYSQL_USER: ${ZABBIX_DB_USER}
      MYSQL_PASSWORD: ${ZABBIX_DB_PASSWORD}
    ports:
      - "10051:10051"
    networks:
      - backend

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-7.0-latest
    container_name: prueba-tecnica-zabbix-web
    restart: unless-stopped
    depends_on:
      - zabbix-server
      - zabbix-db
    environment:
      TZ: ${TZ}
      DB_SERVER_HOST: zabbix-db
      MYSQL_DATABASE: ${ZABBIX_DB_NAME}
      MYSQL_USER: ${ZABBIX_DB_USER}
      MYSQL_PASSWORD: ${ZABBIX_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${ZABBIX_DB_ROOT_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: ${TZ}
    ports:
      - "${ZABBIX_PORT}:8080"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  zabbix-agent:
    image: zabbix/zabbix-agent:ubuntu-7.0-latest
    container_name: prueba-tecnica-zabbix-agent
    restart: unless-stopped
    depends_on:
      - zabbix-server
    environment:
      ZBX_HOSTNAME: Zabbix server
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      TZ: ${TZ}
    networks:
      - backend

volumes:
  hesk_db_data:
  zabbix_db_data:

networks:
  backend:
    driver: bridge